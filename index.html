<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Potfolio</title>
</head>

<body>

  <div
    class="min-h-screen relative overflow-hidden flex justify-center bg-gradient-to-br from-emerald-400 via-red-300 to-sky-700">

    <div
      class="flex flex-col gap-4 items-center p-6 w-[50%] h-[50%] mt-4 rounded-2xl bg-white/15 backdrop-blur-md border border-white/35 shadow-lg">

      <h1 class="text-3xl font-bold text-teal-900">
        Portafolio
      </h1>

      <!-- <form class="flex flex-col gap-4 bg-gradient-to-t from-teal-100 to-teal-700 w-full p-4 rounded-lg">
        <input type="text" id="title" placeholder="Título" />
        <input type="text" id="src" placeholder="URL de imagen" />
        <textarea id="description" placeholder="Descripción"></textarea>
        <button type="submit" class="px-4 py-2 bg-teal-700 hover:bg-teal-800 text-white rounded transition">
          Click Me!

      <form class="flex flex-col gap-4 w-full p-4 rounded-lg bg-gradient-to-tl from-red-400 via-stone-100 to-teal-300">

        <!-- Title -->
        <div class="relative">
          <input type="text" id="title" placeholder=" " required
            class="peer w-full border-b-2 border-teal-800 bg-transparent outline-none py-2 focus:border-amber-500 transition" />
          <label for="title" class="absolute top-2 left-0 text-teal-800 transition-all duration-200
             peer-focus:-translate-y-6 peer-focus:text-amber-500 peer-focus:text-sm
             peer-[:not(:placeholder-shown)]:-translate-y-6 
             peer-[:not(:placeholder-shown)]:text-sm">
            Título *
          </label>
        </div>

        <!-- URL -->
        <div class="relative">
          <input type="text" id="src" placeholder=" " required
            class="peer w-full border-b-2 border-teal-800 bg-transparent outline-none py-2 focus:border-amber-500 transition" />
          <label for="src" class="absolute top-2 left-0 text-teal-800 transition-all duration-200
             peer-focus:-translate-y-6 peer-focus:text-amber-500 peer-focus:text-sm
             peer-[:not(:placeholder-shown)]:-translate-y-6 
             peer-[:not(:placeholder-shown)]:text-sm">
            URL de imagen *
          </label>
        </div>

        <!-- Textarea -->
        <div class="relative">
          <textarea id="description" placeholder=" " required
            class="peer w-full border-b-2 border-teal-800 bg-transparent outline-none py-2 focus:border-amber-500 transition resize-none"></textarea>
          <label for="description" class="absolute top-2 left-0 text-teal-800 transition-all duration-200
             peer-focus:-translate-y-6 peer-focus:text-amber-500 peer-focus:text-sm
             peer-[:not(:placeholder-shown)]:-translate-y-6 
             peer-[:not(:placeholder-shown)]:text-sm">
            Descripción *
          </label>
        </div>

        <button type="submit" class="px-4 py-2 bg-teal-700 hover:bg-teal-800 text-white rounded transition">
          Añadir tarjeta
        </button>
      </form>
    </div>
    <div id="grid"></div>
  </div>


  <script type="text/javascript" src="./index.js"></script>
</body>

</html>
